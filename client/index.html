<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nithish Kumar - Cloud Operations Engineer & SRE-Focused Software Engineer. Resume, experience, projects and contact."
    />
    <title>Nithish Kumar | Cloud Operations & SRE Engineer</title>

    <!-- Preconnect + fonts: Sora (display), Inter (body), JetBrains Mono (data/labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Inline script: applies the saved theme (or system preference) BEFORE
      React mounts, so the page never "flashes" the wrong theme on load.
      See src/context/ThemeContext.jsx for the rest of the theme logic.
    -->
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = saved || (prefersDark ? "dark" : "light");
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
